<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head_info">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnhBar Hobby Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.3/jquery.validate.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validation-unobtrusive/3.2.12/jquery.validate.unobtrusive.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
	<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2633",
                        "text-primary": "#111418",
                        "text-secondary": "#637588",
                        "border-light": "#f0f2f4",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    
                },
            },
        }
        
        $(document).ready(function() {
            $('.use-select2').select2({
                width: '100%'
            });
        });
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }

            .material-symbols-outlined.fill {
                font-variation-settings: 'FILL' 1;
            }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }

        /* Ẩn icon con mắt mặc định trên Microsoft Edge */
        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }

        /* Một số phiên bản Chrome/Safari cũ cũng có thể hiện icon, dùng cách này để ẩn */
        input::-webkit-contacts-auto-fill-button,
        input::-webkit-credentials-auto-fill-button {
            visibility: hidden;
            display: none !important;
            pointer-events: none;
        }

        /* Giới hạn độ cao của khung xổ xuống */
        .select2-results__options {
            max-height: 160px !important; /* Chiều cao tối đa bạn muốn */
            overflow-y: auto !important;
        }

        /* (Tùy chọn) Chỉnh lại style cho khớp với Tailwind của bạn */
        .select2-container .select2-selection--single {
            height: 48px !important; /* Khớp với h-12 của Tailwind */
            padding: 10px;
            border-color: #e5e7eb; /* Màu border-light */
            border-radius: 0.5rem; /* rounded-lg */
        }
    </style>
</head>
</html>
