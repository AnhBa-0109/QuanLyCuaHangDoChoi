<!DOCTYPE html>
<html class="light" lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head_info}"></head>

<body class="bg-background-light dark:bg-background-dark h-screen flex overflow-hidden">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="flex-1 flex flex-col min-w-0">
        <header th:replace="~{fragments/header :: header}"></header>
        <main class="flex-1 overflow-y-auto">
            <div class="p-6 md:p-8 flex flex-col gap-4">

                <header class="flex-none">
                    <div class="flex items-center gap-3">
                        <a th:href="@{/admin/employee}"
                           class="p-2 text-[#637588] hover:text-primary hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-lg transition-colors">
                            <span class="material-symbols-outlined text-[24px]">arrow_back</span>
                        </a>
                        <div>
                            <h1 class="text-text-main dark:text-white text-2xl font-black leading-tight tracking-tight">Thêm Nhân viên Mới</h1>
                            <p class="text-text-secondary dark:text-slate-400 text-base font-normal">Điền thông tin bên dưới để tạo tài khoản nhân viên mới.</p>
                        </div>
                    </div>
                </header>

                <form th:action="@{/admin/employee/create}" th:object="${userCreate}" 
                      method="post" enctype="multipart/form-data">

                    <div class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-border-light dark:border-border-dark overflow-hidden">
                        <div class="p-6 lg:p-8 flex flex-col gap-8">

                            <div class="flex flex-col gap-6">
                                <div class="flex items-center gap-2 pb-2 border-b border-border-light dark:border-border-dark/50">
                                    <span class="material-symbols-outlined text-primary">badge</span>
                                    <h3 class="text-lg font-bold text-text-main dark:text-white">Thông tin cá nhân</h3>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                    <label class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">
                                            Họ và tên <span class="text-red-500">*</span>
                                        </span>
                                        <input type="text" th:field="*{fullName}" placeholder="Ví dụ: Nguyễn Văn A"
                                               class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-4 text-text-main dark:text-white placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
                                        <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"
                                              class="text-red-500 text-xs font-medium"></span>
                                    </label>

                                    <label class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">
                                            Email <span class="text-red-500">*</span>
                                        </span>
                                        <input type="email" th:field="*{email}" placeholder="Ví dụ: email@example.com"
                                               class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-4 text-text-main dark:text-white placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
                                        <span th:if="${errorEmail}" th:text="${errorEmail}"
                                              class="text-red-500 text-xs font-medium"></span>
                                    </label>

                                    <label class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">Số điện thoại</span>
                                        <input type="text" th:field="*{phone}" placeholder="Ví dụ: 0123456789"
                                               class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-4 text-text-main dark:text-white placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
                                    </label>

                                    <div class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">Giới tính</span>
                                        <div class="flex items-center gap-6 h-12">
                                            <label class="inline-flex items-center gap-2 cursor-pointer group">
                                                <input type="radio" th:field="*{sex}" value="true"
                                                       class="form-radio text-primary focus:ring-primary w-5 h-5" />
                                                <span class="text-text-main dark:text-slate-300 group-hover:text-primary transition-colors">Nam</span>
                                            </label>
                                            <label class="inline-flex items-center gap-2 cursor-pointer group">
                                                <input type="radio" th:field="*{sex}" value="false"
                                                       class="form-radio text-primary focus:ring-primary w-5 h-5" />
                                                <span class="text-text-main dark:text-slate-300 group-hover:text-primary transition-colors">Nữ</span>
                                            </label>
                                        </div>
                                    </div>

                                    <label class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">Ngày sinh</span>
                                        <input type="date" th:field="*{bDay}"
                                               class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-4 text-text-main dark:text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
                                    </label>

                                    <label class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">Avatar</span>
                                        <input type="file" name="avatarFile" accept="image/*"
                                               class="form-input w-full rounded-lg border border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-3 py-2.5 text-text-main dark:text-white text-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 hover:file:cursor-pointer" />
                                    </label>

                                </div>
                            </div>

                            <div class="flex flex-col gap-6">
                                <div class="flex items-center gap-2 pb-2 border-b border-border-light dark:border-border-dark/50">
                                    <span class="material-symbols-outlined text-primary">manage_accounts</span>
                                    <h3 class="text-lg font-bold text-text-main dark:text-white">Thiết lập tài khoản</h3>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                    <div class="flex flex-col gap-2 md:col-span-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">
                                            Vai trò <span class="text-red-500">*</span>
                                        </span>
                                        <select th:field="*{roleU}"
                                                class="form-select w-full rounded-lg border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-4 text-text-main dark:text-white focus:border-primary focus:ring-1 focus:ring-primary appearance-none transition-all cursor-pointer">
                                            <option value="user">Nhân viên</option>
                                            <option value="Admin">Quản trị viên</option>
                                        </select>
                                    </div>

                                    <label class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">
                                            Tên đăng nhập <span class="text-red-500">*</span>
                                        </span>
                                        <input type="text" th:field="*{username}" placeholder="username123"
                                               class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-4 text-text-main dark:text-white placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
                                        <span th:if="${errorUsername}" th:text="${errorUsername}"
                                              class="text-red-500 text-xs font-medium"></span>
                                    </label>

                                    <label class="flex flex-col gap-2">
                                        <span class="text-text-main dark:text-slate-200 text-sm font-medium">
                                            Mật khẩu <span class="text-red-500">*</span>
                                        </span>
                                        <div class="relative">
                                            <input type="password" th:field="*{passwordU}" id="passwordInput"
                                                   autocomplete="new-password"
                                                   class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-white dark:bg-[#111921] h-12 px-4 pr-12 text-text-main dark:text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
                                            <button type="button" id="togglePassword"
                                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary dark:text-slate-500 hover:text-text-main dark:hover:text-white transition-colors">
                                                <span id="toggleIcon" class="material-symbols-outlined text-[20px]">visibility</span>
                                            </button>
                                        </div>
                                        <p class="text-xs text-text-secondary dark:text-slate-500 mt-1">Mật khẩu tối thiểu 8 ký tự, gồm chữ hoa, thường &amp; số.</p>
                                    </label>

                                </div>
                            </div>

                        </div>

                        <div class="px-6 py-4 lg:px-8 bg-background-light dark:bg-[#151d26] border-t border-border-light dark:border-border-dark flex items-center justify-end gap-3">
                            <a th:href="@{/admin/employee}">
                                <button type="button"
                                        class="h-10 px-6 rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark text-text-main dark:text-white font-medium hover:bg-gray-50 dark:hover:bg-[#202933] transition-colors">
                                    Hủy
                                </button>
                            </a>
                            <button type="submit"
                                    class="h-10 px-6 rounded-lg bg-primary text-white font-medium hover:bg-blue-600 transition-colors shadow-sm shadow-blue-500/20">
                                Thêm Nhân viên
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </main>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const toggleIcon = document.getElementById('toggleIcon');

        toggleBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        });
    </script>

    <style>
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none !important;
        }
    </style>
</body>
</html>
